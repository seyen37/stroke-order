# =====================================================================
# stroke-order — CI
#
# Runs on every push and pull request to main:
#   1. Set up Python 3.10/3.11/3.12 matrix
#   2. Install package + dev extras
#   3. Run the full pytest suite
#
# Each successful run leaves a publicly verifiable timestamp on GitHub
# (Actions tab), useful both for everyday confidence and as third-party
# proof of project state at any given commit.
# =====================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  test:
    name: pytest (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system deps for cairosvg
        # cairosvg needs cairo + pango at OS level
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0

      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          # Use dev mode so gallery tests don't try to send SMTP
          STROKE_ORDER_AUTH_DEV_MODE: "true"
          STROKE_ORDER_AUTH_SECRET: "ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaa"
        run: |
          pytest tests/ -v --tb=short
